name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare static export
        run: |
          cp next.config.cpanel.js next.config.js
          sed -i "/force-dynamic/d" app/[locale]/layout.tsx
          rm -rf app/api
          cp public/images/home/candidates/elite-candidate-nanny.webp public/images/home/candidate-executive-nanny.webp
          cp public/images/home/candidates/elite-candidate-chef.webp public/images/home/candidate-private-chef.webp
          cp public/images/home/candidates/elite-candidate-house-manager.webp public/images/home/candidate-house-manager.webp

      - name: Build static site
        env:
          NEXT_PUBLIC_STATIC_EXPORT: 'true'
        run: npm run build

      - name: Optimize exported images
        run: |
          npm install --no-save sharp
          node <<'NODE'
          const fs = require('fs/promises');
          const path = require('path');
          const sharp = require('sharp');

          const outDir = path.resolve('out');
          const replacements = [];

          async function walk(dir) {
            const entries = await fs.readdir(dir, { withFileTypes: true });
            const files = [];
            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) files.push(...await walk(fullPath));
              else files.push(fullPath);
            }
            return files;
          }

          function toWebPath(filePath) {
            return path.relative(outDir, filePath).split(path.sep).join('/');
          }

          function maxWidthFor(webPath) {
            if (webPath.startsWith('authority-logos/')) return 320;
            if (webPath.startsWith('brand/')) return 620;
            if (webPath.startsWith('images/services/')) return 900;
            if (webPath.startsWith('images/home/')) return 1400;
            if (webPath.startsWith('images/countries/')) return 900;
            if (webPath.startsWith('images/service-areas/')) return 900;
            return 1200;
          }

          async function optimizeImage(filePath) {
            const ext = path.extname(filePath).toLowerCase();
            if (!['.webp', '.png', '.jpg', '.jpeg'].includes(ext)) return;

            const webPath = toWebPath(filePath);
            const maxWidth = maxWidthFor(webPath);
            const metadata = await sharp(filePath).metadata();
            const shouldResize = metadata.width && metadata.width > maxWidth;

            if (ext === '.png' && (webPath.startsWith('authority-logos/') || webPath.startsWith('brand/'))) {
              const nextWebPath = webPath.replace(/\.png$/i, '.webp');
              const webpFile = path.join(outDir, nextWebPath);
              await sharp(filePath)
                .resize({ width: maxWidth, withoutEnlargement: true })
                .webp({ quality: 74, effort: 6 })
                .toFile(webpFile);
              replacements.push([`/${webPath}`, `/${nextWebPath}`]);
              replacements.push([webPath, nextWebPath]);
              return;
            }

            if (!shouldResize && ext === '.png') return;

            const tempFile = `${filePath}.optimized`;
            let image = sharp(filePath).resize({ width: maxWidth, withoutEnlargement: true });

            if (ext === '.webp') image = image.webp({ quality: 74, effort: 6 });
            if (ext === '.jpg' || ext === '.jpeg') image = image.jpeg({ quality: 76, progressive: true, mozjpeg: true });
            if (ext === '.png') image = image.png({ compressionLevel: 9, adaptiveFiltering: true, palette: true });

            await image.toFile(tempFile);
            await fs.rename(tempFile, filePath);
          }

          async function applyReplacements(files) {
            if (!replacements.length) return;
            const textExtensions = new Set(['.html', '.js', '.css', '.txt']);
            for (const filePath of files) {
              if (!textExtensions.has(path.extname(filePath).toLowerCase())) continue;
              let content = await fs.readFile(filePath, 'utf8');
              let nextContent = content;
              for (const [from, to] of replacements) nextContent = nextContent.split(from).join(to);
              if (nextContent !== content) await fs.writeFile(filePath, nextContent);
            }
          }

          (async () => {
            const files = await walk(outDir);
            for (const file of files) {
              try { await optimizeImage(file); }
              catch (error) { console.warn(`Skipped image optimization for ${file}: ${error.message}`); }
            }
            const nextFiles = await walk(outDir);
            await applyReplacements(nextFiles);
            console.log(`Optimized exported images. Modernized ${replacements.length / 2} PNG references.`);
          })();
          NODE

      - name: Add cPanel root files
        run: |
          cat > out/.htaccess <<'EOF'
          Options -Indexes
          DirectoryIndex index.html

          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/html "access plus 0 seconds"
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType text/javascript "access plus 1 year"
            ExpiresByType image/avif "access plus 1 year"
            ExpiresByType image/webp "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType image/x-icon "access plus 1 year"
            ExpiresByType font/woff2 "access plus 1 year"
            ExpiresByType application/font-woff2 "access plus 1 year"
          </IfModule>

          <IfModule mod_headers.c>
            <FilesMatch "\.(?:css|js|mjs|webp|avif|png|jpe?g|svg|ico|woff2)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
            <FilesMatch "\.(?:html)$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
              Header set Pragma "no-cache"
              Header set Expires "0"
            </FilesMatch>
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json image/svg+xml
          </IfModule>

          <IfModule mod_brotli.c>
            AddOutputFilterByType BROTLI_COMPRESS text/html text/plain text/css text/javascript application/javascript application/json image/svg+xml
          </IfModule>
          EOF
          cat > out/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>INAYA Domestic Workers</title>
              <link rel="alternate" hreflang="en" href="/en/">
              <link rel="alternate" hreflang="ar" href="/ar/">
              <script>
                (function () {
                  var languages = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'en'];
                  var isArabic = languages.some(function (language) { return String(language).toLowerCase().indexOf('ar') === 0; });
                  window.location.replace(isArabic ? '/ar/' : '/en/');
                })();
              </script>
              <noscript><meta http-equiv="refresh" content="0; url=/en/"></noscript>
            </head>
            <body style="margin:0;min-height:100vh;display:grid;place-items:center;background:#fbfaf7;color:#07164A;font-family:system-ui,sans-serif;">
              <p>Redirecting to INAYA Domestic Workers...</p>
            </body>
          </html>
          EOF

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to cPanel
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_SERVER_DIR: ${{ secrets.CPANEL_FTP_SERVER_DIR }}
        run: |
          lftp -u "$CPANEL_FTP_USER","$CPANEL_FTP_PASSWORD" "$CPANEL_FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set ftp:list-options -a
          set net:max-retries 3
          set net:timeout 30
          set mirror:parallel-directories true
          mirror --reverse --delete --verbose --parallel=3 \
            --exclude-glob .well-known \
            --exclude-glob .well-known/** \
            --exclude-glob .ftp-deploy-sync-state.json \
            ./out/ "$CPANEL_FTP_SERVER_DIR"
          bye
          EOF
