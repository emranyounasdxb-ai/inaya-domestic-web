name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare static export
        run: |
          cp next.config.cpanel.js next.config.js
          sed -i "/force-dynamic/d" app/[locale]/layout.tsx
          cp public/images/home/candidates/elite-candidate-nanny.webp public/images/home/candidate-executive-nanny.webp
          cp public/images/home/candidates/elite-candidate-chef.webp public/images/home/candidate-private-chef.webp
          cp public/images/home/candidates/elite-candidate-house-manager.webp public/images/home/candidate-house-manager.webp

      - name: Build static site
        run: npm run build

      - name: Deploy to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.CPANEL_FTP_SERVER_DIR }}
